name: Deploy to Production

on:
  push:
    branches: [release_prod]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests -q

      - name: Generate Production properties (Simple Merge)
        env:
          TFL_APP_KEY: ${{ secrets.TFL_APP_KEY }}
          FIRESTORE_PROJECT_ID: ${{ secrets.FIRESTORE_PROJECT_ID }}
        run: |
          cp src/main/resources/application.properties /tmp/application.properties
          
          while IFS='=' read -r key value; do
              [[ -z "$key" || "$key" =~ ^# ]] && continue
              clean_key=$(echo "$key" | xargs)
              
              # Map key to standard uppercase env var name (e.g., tfl.app.key -> TFL_APP_KEY)
              env_var_name=$(echo "$clean_key" | tr 'a-z.-' 'A-Z__')
              secret_value="${!env_var_name}"
              
              if [ -n "$secret_value" ]; then
                  echo "  Writing $clean_key from secret $env_var_name"
                  if grep -q "^${clean_key}=" /tmp/application.properties; then
                      sed -i "s|^${clean_key}=.*|${clean_key}=${secret_value}|g" /tmp/application.properties
                  else
                      echo "${clean_key}=${secret_value}" >> /tmp/application.properties
                  fi
              fi
          done < src/main/resources/application-remote.properties

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/prod.key
          chmod 600 ~/.ssh/prod.key
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy JAR and Config
        run: |
          scp -i ~/.ssh/prod.key \
            target/stationly_syncer-*.jar \
            ubuntu@${{ secrets.PROD_HOST }}:~/stationly_syncer.jar

          scp -i ~/.ssh/prod.key \
            /tmp/application.properties \
            ubuntu@${{ secrets.PROD_HOST }}:~/config/application.properties

      - name: Write dummy prod.env on server (for systemd compatibility)
        run: |
          ssh -i ~/.ssh/prod.key ubuntu@${{ secrets.PROD_HOST }} "
            sudo mkdir -p /etc/stationly
            echo '# Migrated to ~/config/application.properties' | sudo tee /etc/stationly/prod.env > /dev/null
            sudo chmod 600 /etc/stationly/prod.env
          "

      - name: Restart service
        run: |
          ssh -i ~/.ssh/prod.key ubuntu@${{ secrets.PROD_HOST }} \
            'sudo systemctl restart stationly.service'

      - name: Health check
        run: |
          sleep 5
          STATUS=$(ssh -i ~/.ssh/prod.key ubuntu@${{ secrets.PROD_HOST }} \
            'systemctl is-active stationly.service' 2>/dev/null || echo "unknown")
          if [ "$STATUS" = "active" ]; then
            echo "✅ Production deployment complete — stationly.service is active"
          else
            echo "❌ Health check failed — stationly.service status: $STATUS"
            exit 1
          fi
